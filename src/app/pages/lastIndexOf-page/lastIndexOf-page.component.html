<section class="animate-fade-in w-full flex-row px-10 transition-all">
  <hgroup>
    <h1>lastIndexOf</h1>
    <p>
      El método
      <span>lastIndexOf() </span> devuelve el índice de la última aparición de
      un elemento. Comienza buscando por el final del array. Retorna -1 si el
      elemento no se encuentra.
    </p>
  </hgroup>
  <p>
    Array original:<strong> {{ fruits() | json }}</strong>
  </p>
  <p>
    Resultado al utilizar el método lastIndexOf:
    <strong> {{ resultArray | json }}</strong>
  </p>
  <figure>
    <img
      loading="lazy"
      class="rounded-xs border p-1"
      src="./assets/images/lastIndexOf.webp"
      alt="Ejemplo de código en typescript"
    />
    <figcaption>Ejemplo de código en el componente de typescript.</figcaption>
  </figure>
  <div class="flex justify-center gap-5">
    <app-button-previous-page (click)="previousPage()" />
    <app-button-next-page (click)="nextPage()" />
  </div>
</section>
